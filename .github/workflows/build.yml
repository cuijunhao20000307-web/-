name: Build Hyrule Bridge Ultra

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITA64: /opt/devkitpro/devkitA64
        PATH: /opt/devkitpro/devkitA64/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - uses: actions/checkout@v4

      - name: Verify toolchain
        shell: bash
        run: |
          set -euxo pipefail
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITA64=$DEVKITA64"
          test -x "$DEVKITA64/bin/aarch64-none-elf-g++"
          "$DEVKITA64/bin/aarch64-none-elf-g++" --version
          test -f "$DEVKITPRO/libnx/switch_rules"

      - name: Install packaging tools
        shell: bash
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends curl unzip ca-certificates python3

      - name: Fetch libultrahand
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p lib
          rm -rf lib/libultrahand
          git clone --depth 1 https://github.com/ppkantorski/libultrahand.git lib/libultrahand

      - name: Build overlay
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$DEVKITA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make -j2
          test -f HyruleBridgeUltra.ovl

      - name: Download Tesla Menu and nx-ovlloader
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p downloads package

          download_latest_zip() {
            repo="$1"
            output="$2"
            api="https://api.github.com/repos/${repo}/releases/latest"
            curl -fsSL -H "Accept: application/vnd.github+json" "$api" -o release.json
            url=$(python3 -c 'import json,sys; d=json.load(open("release.json")); assets=d.get("assets",[]); z=[a["browser_download_url"] for a in assets if a.get("name","").lower().endswith(".zip")]; print(z[0] if z else "")')
            test -n "$url"
            curl -fL "$url" -o "$output"
          }

          download_latest_zip "WerWolv/Tesla-Menu" "downloads/tesla-menu.zip"
          unzip -o downloads/tesla-menu.zip -d package

          download_latest_zip "WerWolv/nx-ovlloader" "downloads/nx-ovlloader.zip"
          unzip -o downloads/nx-ovlloader.zip -d package

          test -f package/switch/.overlays/ovlmenu.ovl
          test -d package/atmosphere/contents/420000000007E51A

      - name: Prepare complete install package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p package/switch/.overlays
          cp HyruleBridgeUltra.ovl package/switch/.overlays/HyruleBridgeUltra.ovl
          mkdir -p package/config/hyrule-bridge
          cp config/bridge.ini package/config/hyrule-bridge/bridge.ini
          cat > package/安装说明.txt <<'EOF'
          海拉鲁导航完整安装包

          1. 将本压缩包内全部文件复制到 Switch SD 卡根目录并选择合并/覆盖。
          2. 重启 Switch 或重启 Atmosphere。
          3. 默认呼出组合键：L + 十字键下 + 右摇杆按下。
          4. 在 Tesla Menu 中选择“海拉鲁导航”。
          5. 手机与 Switch 连接同一 Wi-Fi，在手机浏览器打开插件显示的网址。

          本包包含：
          - HyruleBridgeUltra.ovl（海拉鲁导航）
          - ovlmenu.ovl（Tesla Menu）
          - nx-ovlloader（Tesla 后台加载器）
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: HyruleBridgeUltra-0.3.0-Full-Tesla-Pack
          path: package/
          if-no-files-found: error
